# Kernel-dev VM image.
#
# Built with `mkosi build` from this directory; booted with `mkosi vm` (which
# drives qemu+KVM). The image is a RUNTIME-ONLY rootfs — it carries NO distro
# kernel and NO build toolchain. The kernel we boot is the one compiled by
# kernel/build.sh and staged into mkosi.extra/usr/lib/modules/<release>/
# (vmlinuz + its modules). mkosi turns that vmlinuz into a UKI (Bootloader=uki)
# and qemu direct-boots it.
#
# Distro-portable: the distribution defaults to the host (Arch on Arch, Debian
# on Debian); per-distro package lists are in mkosi.conf.d/. Two image tweaks
# make `mkosi ssh` work everywhere: mkosi.postinst bakes SSH host keys (Arch's
# openssh doesn't wire sshd-keygen.target), and mkosi.extra masks the distro's
# own sshd-vsock.socket so it doesn't collide with mkosi's ssh.socket.
#
# Everything you build (kernel modules, userspace tools) is built on the HOST
# and reaches the guest through the RuntimeTrees bind mount at /root/dev — no
# copy step, no image rebuild for module-only changes.

[Distribution]
# No Distribution= here: mkosi defaults to the HOST's distro, so the dev VM is
# Arch on an Arch host and Debian on a Debian host with no edits. The per-distro
# package lists live in mkosi.conf.d/ (arch.conf, debian.conf) — mkosi applies
# the one whose [Match] Distribution= fits. Override with `mkosi -d <distro>` to
# cross-build (the host then needs that distro's bootstrap tool: pacman for arch,
# mmdebstrap for debian/ubuntu).

[Output]
Format=directory
Output=devkernel-vm
OutputDirectory=mkosi.output

[Content]
# Packages are distro-specific — see mkosi.conf.d/arch.conf and debian.conf.

# Build a UKI from the kernel we staged under /usr/lib/modules/<release>/.
# This is what makes the VM boot OUR compiled kernel.
Bootloader=uki

# Install an sshd-over-vsock socket so `mkosi ssh` (vm/ssh.sh) can open a root
# shell. The keypair comes from `mkosi genkey` (run by `make image`); the public
# half is embedded here. (This is a [Content] setting in mkosi, not [Runtime].)
Ssh=yes

# Pre-seed first-boot settings so systemd-firstboot does NOT stop to prompt for
# timezone/locale/hostname on the console (which would block autologin + sshd).
Locale=C.UTF-8
Timezone=UTC
Hostname=devkernel

# Console autologin so `make vm` drops you straight at a root prompt.
Autologin=yes

# Empty hashed password = passwordless root. Safe in a local-only dev VM;
# `mkosi ssh` (vm/ssh.sh) connects over vsock with mkosi's managed key.
RootPassword=hashed:

[Runtime]
# qemu backend (not vmspawn): qemu is available on every distro, while
# systemd-vmspawn is brand-new and NOT packaged on Debian trixie. `mkosi vm`
# direct-boots the UKI under qemu+KVM.
VirtualMachineMonitor=qemu
RAM=2G
CPUs=4
# vsock is the transport `mkosi ssh` uses (see Ssh= in [Content]).
VSock=yes
RuntimeNetwork=user
# native = qemu's own console. interactive/read-only need systemd-pty-forward,
# which Arch ships but Debian trixie does not — native works on both. `make vm`
# gives a qemu serial console; `poweroff` inside to exit (Ctrl-A X kills qemu).
Console=native
# Bind the whole repo into the VM at /root/dev. Host-built artifacts
# (module/hello.ko, etc.) appear there with no copy. mkosi maps the invoking
# user's uid/gid to root inside the VM, so files look root-owned.
RuntimeTrees=..:/root/dev
