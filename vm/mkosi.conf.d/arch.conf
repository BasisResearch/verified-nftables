# Arch-specific package list for the dev VM image.
# Applied when the image distribution is Arch (the default on an Arch host).
[Match]
Distribution=arch

[Content]
# Runtime-only userland. No base-devel, no linux, no headers.
Packages=
        base
        kmod
        openssh
        iproute2
        nftables
        tcpdump
        strace
        gdb
        less
        nano
        # ukify (invoked by mkosi to build the UKI) needs pefile; it's an
        # optional dep of systemd on Arch, so pull it in explicitly.
        python-pefile
