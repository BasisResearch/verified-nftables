# Debian/Ubuntu package list for the dev VM image.
# Applied when the image distribution is debian OR ubuntu (the default on those
# hosts). Building this needs `mmdebstrap` on the host (see SETUP.md).
#
# The `|` prefix ORs match values, so this drop-in applies to both debian and
# ubuntu. (Plain repeated keys or separate [Match] sections AND instead, which
# would never match.)
[Match]
Distribution=|debian
Distribution=|ubuntu

[Content]
# Runtime-only userland. Debian splits out an init + udev that Arch's `base`
# bundles, so we name them explicitly. No build-essential, no linux-image.
Packages=
        systemd
        systemd-sysv
        systemd-resolved
        # Bootloader=uki needs the EFI stub (linuxx64.efi.stub) and ukify INSIDE
        # the image. Arch ships these in `systemd`; Debian splits them out.
        systemd-boot-efi
        systemd-ukify
        udev
        dbus
        kmod
        openssh-server
        iproute2
        nftables
        tcpdump
        strace
        gdb
        less
        nano
        ca-certificates
        iputils-ping
# No python-pefile here: on Debian the UKI is built by the host's
# systemd-ukify (python3-pefile is a HOST dep, installed per SETUP.md), not
# inside the image.
