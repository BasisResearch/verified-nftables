# certified-nft — END-TO-END VM image (packaged distro kernel, rootless).
#
# This is a SEPARATE mkosi config from vm/ (which direct-boots a CUSTOM,
# hand-compiled kernel via a manually-staged UKI).  Here we want the OPPOSITE:
# a stock, PACKAGED distro kernel that already ships nftables, so we can drive
# the verified `nftc` CLI end-to-end against a REAL kernel netfilter stack with
# no kernel build.  Do NOT point `make kernel` / kernel/build.sh at this.
#
# Design choices forced by the host environment (see vm-e2e/README):
#   * Format=disk (NOT directory): a `mkosi vm` directory boot needs virtiofsd
#     to present the rootfs, and virtiofsd is not installed here.  A GPT disk
#     is booted by qemu as a plain virtio-blk device — no virtiofsd.
#   * Bootloader=uki + a PACKAGED kernel: installing the `linux` package drops
#     /usr/lib/modules/<ver>/vmlinuz, which mkosi wraps into a UKI and qemu
#     boots under OVMF (edk2-ovmf is present).  No custom vmlinuz staging.
#   * Everything the test needs (the host-built nftc binary + rulesets + the
#     e2e driver) is BAKED IN via mkosi.extra/ — there is no bind mount, again
#     because virtiofsd is missing.  The image is Arch (host distro default),
#     so the native OCaml binary's libc matches.
#   * Rootless: the host has /etc/subuid+subgid ranges and newuidmap, so
#     `mkosi build` runs unprivileged in a user namespace; /dev/kvm is
#     world-rw so `mkosi vm` gets KVM without sudo.

[Distribution]
Distribution=arch

[Output]
Format=disk
Output=e2e-vm
OutputDirectory=mkosi.output

[Content]
# A packaged kernel (linux) makes this VM boot a stock nftables-capable kernel.
# conntrack-tools + iproute2 give us `conntrack` and `nft`/`ip` for readback.
Packages=
        base
        kmod
        linux
        systemd
        dbus
        openssh
        iproute2
        nftables
        conntrack-tools
        iputils
        less
        # python drives the runtime ct-state match test (opens an established
        # loopback TCP connection so `ct state established` counts real packets).
        python

# No bootloader / no ESP: we DIRECT-boot the packaged kernel (Firmware=linux in
# [Runtime]).  A UKI/ESP would need mkfs.vfat (dosfstools), which is not on the
# host and can't be sudo-installed; direct kernel boot (qemu -kernel) sidesteps
# the ESP entirely and boots the same packaged vmlinuz + mkosi's initrd.
Bootloader=none

# Root shell over vsock for the driver script (vm-e2e/run-e2e.sh -> mkosi ssh).
Ssh=yes

# First-boot: no interactive firstboot prompts, autologin on the console,
# passwordless root (local-only dev VM).
Locale=C.UTF-8
Timezone=UTC
Hostname=nftc-e2e
Autologin=yes
RootPassword=hashed:

[Runtime]
# Direct kernel boot (qemu -kernel <vmlinuz> -initrd <initrd> root=<part>): no
# UEFI firmware, no ESP, no vfat.  mkosi pulls the packaged kernel + the initrd
# it built out of the image; systemd-gpt-auto finds the Type=root partition.
# vsock carries `mkosi ssh`.
Firmware=linux
VirtualMachineMonitor=qemu
RAM=2G
CPUs=4
VSock=yes
RuntimeNetwork=user
Console=native
